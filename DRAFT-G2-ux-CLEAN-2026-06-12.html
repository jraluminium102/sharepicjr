var SET=[1.0,1.2,1.5,2.0,3.0];
function ranaeH(h){for(var i=0;i<SET.length;i++){if(h<=SET[i]+1e-9)return SET[i];}return 3.0;}
function ranaeDisc(a){return a>30?.15:a>20?.11:a>15?.08:a>10?.05:0;}
function rU(n){return Math.ceil(n/1000)*1000;}
function ranaePrice(rate,w,h,cut,finv){var hh=cut==='splice'?h:ranaeH(h);var a=w*hh;return rU(a*(rate+finv)*(1-ranaeDisc(a)));}
function rateOf(len,t){for(var i=0;i<t.length;i++){if(len>=t[i][0]&&len<t[i][1])return t[i][2];}return t[t.length-1][2];}
function railPrice(imp,len,hr){var r=rateOf(len,DATA.IMP['IMP'+imp.slice(3)]);var h=hr==='u'?500*len:hr==='box'?600*len:0;return rU(len*r+h);}
function fmt(n){return '฿'+Math.round(n).toLocaleString();}
function finVal(k){return k&&DATA.fin[k]?DATA.fin[k]:0;}

// ===== build cascade tree (บังตา) =====
function buildTree(rows,levels){ // levels=2 (profile,spacing,frame) or 1 (spacing,frame)
  var T={};
  rows.forEach(function(r){
    if(levels===2){ var pf=r[2],sp=r[3],fr=r[4]; T[pf]=T[pf]||{}; T[pf][sp]=T[pf][sp]||{}; T[pf][sp][fr]={id:r[0],rate:r[1]}; }
    else { var sp2=r[2],fr2=r[3]; T[sp2]=T[sp2]||{}; T[sp2][fr2]={id:r[0],rate:r[1]}; }
  });
  return T;
}

    var imp=impOf();
    if(imp==='imp2'||imp==='imp3'||imp==='imp5'||imp==='imp6'){ h+='<div class="lbl">สีอลู</div>'+chipsHTML(['ขาว','เทา','ดำ'],S.rail.alu,'pickRalu',true); }
    h+='<div class="selname">'+RAILNAME[imp]+'</div>';
    h+='<div class="note">ค่ากระจก (glassUp) + ค่าสีอลู → dev ดึงจาก engine</div>';
  } else if(S.cat==='special'){
    h+='<div class="lbl"><span class="step">2</span>เลือกชนิด</div>'+chipsHTML(DATA.special.map(function(s){return [s[0],s[1]];}),S.special.id,'pickSpecial');
    if(S.special.id){ h+='<div class="row" style="margin-top:9px;"><div class="fld"><span>ราคา (กรอกเอง · บาท)</span><input type="number" step="500" value="'+S.special.price+'" oninput="setSpecialP(this.value)"></div></div>'; h+='<div class="note">ระแนงพิเศษราคาซับซ้อน (เลื่อน/เปิด-ปิด) → dev ดึงสูตรจริงจาก engine · ที่นี่กรอกประมาณการ</div>'; }
  }
  f.innerHTML=h; calc();
}
function ranaeForm(withDoor){
  return '<div class="lbl">ขนาดงาน</div>'+sizeHTML()+
    '<div class="lbl">วิธีตัดระแนง <span class="hint">(มีผลต่อราคา)</span></div>'+cutChips()+
    '<div class="lbl">สี/ผิว</div>'+finChips(S.color)+ extrasHTML(withDoor);
}
function impOf(){var m=RAIL.find(function(r){return r[1]===S.rail.shape&&r[2]===S.rail.mount;});return m?m[0]:'imp1';}

function calc(){
  var val=0,title='—';
  if(S.cat==='bangta'&&S.b.id){val=ranaePrice(S.b.rate,S.w,S.h,S.cut,finVal(S.color))+ (+S.door.price||0); title='ระแนงบังตา '+S.b.id;}
  else if(S.cat==='phanang'&&S.p.id){val=ranaePrice(S.p.rate,S.w,S.h,S.cut,finVal(S.color))+(+S.door.price||0); title='ระแนงผนัง '+S.p.id;}
  else if(S.cat==='gleed'&&S.g.id){val=ranaePrice(S.g.rate,S.w,S.h,S.cut,finVal(S.color))+(+S.door.price||0); title='เกล็ด Z '+S.g.id;}
  else if(S.cat==='rail'){val=railPrice(impOf(),S.w,S.rail.hr); title=RAILNAME[impOf()];}
  else if(S.cat==='special'&&S.special.id){val=+S.special.price||0; title=S.special.id;}
  document.getElementById('pval').textContent=fmt(val);
  document.getElementById('ptitle').textContent=title;
}

// resolvers
function resolveB(){var n=TREE_B[S.b.profile];if(n&&S.b.spacing&&n[S.b.spacing]&&S.b.frame&&n[S.b.spacing][S.b.frame]){var o=n[S.b.spacing][S.b.frame];S.b.id=o.id;S.b.rate=o.rate;}else{S.b.id='';S.b.rate=0;}}
function resolveP(){var n=TREE_P[S.p.spacing];if(n&&S.p.frame&&n[S.p.frame]){S.p.id=n[S.p.frame].id;S.p.rate=n[S.p.frame].rate;}else{S.p.id='';S.p.rate=0;}}
function resolveG(){var r=DATA.gleed.find(function(x){return x[2]===S.g.size&&x[3]===S.g.frame;});if(r){S.g.id=r[0];S.g.rate=r[1];}else{S.g.id='';S.g.rate=0;}}

// handlers
function pickCat(b){[].forEach.call(document.querySelectorAll('#catChips .chip'),function(c){c.classList.remove('on');});b.classList.add('on');S.cat=b.dataset.c;render();}
function setSz(k,v){S[k==='w'?'w':'h']=parseFloat(v)||0;calc();}
function setCut(v){S.cut=v;render();}
function setColor(v){S.color=v;render();}
function pickBprofile(v){S.b.profile=v;S.b.spacing='';S.b.frame='';resolveB();render();}
function pickBspacing(v){S.b.spacing=v;S.b.frame='';resolveB();render();}
function pickBframe(v){S.b.frame=v;resolveB();render();}
function pickPspacing(v){S.p.spacing=v;S.p.frame='';resolveP();render();}
function pickPframe(v){S.p.frame=v;resolveP();render();}
function pickGsize(v){S.g.size=v;S.g.frame='';resolveG();render();}
function pickGframe(v){S.g.frame=v;resolveG();render();}
function pickRshape(v){S.rail.shape=v;render();}
function pickRmount(v){S.rail.mount=v;render();}
function pickRglass(v){S.rail.glass=v;render();}
function pickRhr(v){S.rail.hr=v;render();}
function pickRalu(v){S.rail.alu=v;render();}
function setDoor(v){S.door.type=v;render();}
function setDoorP(v){S.door.price=parseFloat(v)||0;calc();}
function pickSpecial(v){S.special.id=v;render();}
function setSpecialP(v){S.special.price=parseFloat(v)||0;calc();}

render();
</script>
</body>
</html>
