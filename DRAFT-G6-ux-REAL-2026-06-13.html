  +'<div class="row"><span class="rl" style="flex:0 0 90px;">ดาวน์ไลท์</span><input type="number" value="'+ELEC.down+'" oninput="setElec(\'down\',this.value)"><span class="u">ดวง ×1,500</span></div>'
  +'<div class="row"><span class="rl" style="flex:0 0 90px;">สวิตช์</span><input type="number" value="'+ELEC.sw+'" oninput="setElec(\'sw\',this.value)"><span class="u">จุด ×1,000</span></div>'
  +'<div class="sl">อุปกรณ์ (กดที่ใช้)</div><div class="chips">'+[['plug','ปลั๊กไฟ'],['lamp','โคมไฟ'],['fan','พัดลมระบายอากาศ'],['ac','อลูทึบติดแอร์'],['beam','เสริมคานม่าน-พัดลม']].map(function(x){return '<button class="c pill'+(ELEC.extras[x[0]]?' on':'')+'" onclick="togElec(\''+x[0]+'\')">'+x[1]+'</button>';}).join('')+'</div>'
  +'<div class="sl">น้ำ/พื้น/บริการ</div><div class="chips"><button class="c pill" onclick="this.classList.toggle(\'on\')">ท่อน้ำลง/บ่อพัก</button><button class="c pill" onclick="this.classList.toggle(\'on\')">ถ่ายระดับ</button><button class="c pill" onclick="this.classList.toggle(\'on\')">รื้อของเดิม</button><button class="c pill" onclick="this.classList.toggle(\'on\')">ขนส่ง ตจว.</button></div>'
  +'<div class="banaPr" style="margin-top:13px;"><span>ราคางานไฟ</span><b>'+fmt(elecTotal())+'</b></div>';}
function sumPage(b){var h='<div class="ph">📄 สรุป — ห้องต่อเติม</div>';
  SIDES.forEach(function(s,i){var desc,pr=0;if(s.type==='glass'){var n=0;s.W.forEach(function(c){c.pcs.forEach(function(p){pr+=banaPrice(p);n++;});});desc=s.W.length+' ช่อง · '+n+' บาน';}else if(s.type==='wall'){pr=Math.round((s.aw||3)*(s.ah||2.6)*RATE.solid);desc='ผนังเบา '+(s.mat||'สมาร์ทบอร์ด');}else{desc='เปิดโล่ง';}
    h+='<div class="sumln"><span class="nm"><b>ด้าน '+L(i)+'</b> · '+desc+'</span><span class="pr">'+(pr?fmt(pr):'—')+'</span></div>';});
  h+='<div class="sumln"><span class="nm"><b>🏠 หลังคา/ฝ้า</b> '+(CEIL.has?(CEIL.mode==='in'?'(รวมฝ้า)':'(ฝ้าแยก)'):'')+'</span><span class="pr">'+fmt(roofTotal())+'</span></div>'
    +'<div class="sumln"><span class="nm"><b>⚡ งานไฟ</b></span><span class="pr">'+fmt(elecTotal())+'</span></div>'
    +'<div class="grand"><span class="gl">รวมทั้งห้อง</span><span class="gv">'+fmt(roomTotal())+'</span></div><div class="note">แตะรายการ=กลับไปแก้ · ราคาเดโม (dev ดึงเรตจริง)</div>';
  b.innerHTML=h;}
// actions
function setSideT(t){SIDES[cur].type=t;if(t==='glass'&&!SIDES[cur].W.length)SIDES[cur].W=[{w:1,pcs:[{fk:'swing',id:'casement_euro',h:2.4,opt:{}}]}];sc=0;sp=0;render();}
function delSide(){SIDES.splice(cur,1);if(cur>=SIDES.length)cur=SIDES.length-1;render();}
function setWallSz(k,v){SIDES[cur][k]=parseFloat(v)||1;updWallPr();document.getElementById('grand').textContent=fmt(roomTotal());}
function updWallPr(){var s=SIDES[cur];var el=document.getElementById('wallpr');if(el)el.textContent=fmt(Math.round((s.aw||3)*(s.ah||2.6)*RATE.solid));}
function openF(k){openFam=k;renderEdit();}
function setSub(fk,id){var p=SIDES[cur].W[sc].pcs[sp];p.fk=fk;p.id=id;openFam=null;renderWall();renderEdit();refreshGrand();}
function rmPc(e,ci,pi){e.stopPropagation();var W=SIDES[cur].W;W[ci].pcs.splice(pi,1);if(!W[ci].pcs.length)W.splice(ci,1);if(sc>=W.length)sc=Math.max(0,W.length-1);sp=0;renderWall();renderEdit();refreshGrand();}
function rmSel(){var W=SIDES[cur].W;W[sc].pcs.splice(sp,1);if(!W[sc].pcs.length)W.splice(sc,1);if(sc>=W.length)sc=Math.max(0,W.length-1);sp=0;renderWall();renderEdit();refreshGrand();}
function setW(v){SIDES[cur].W[sc].pcs[sp].w=parseFloat(v)||0.5;renderWall();renderOpt(SIDES[cur].W[sc].pcs[sp]);refreshGrand();}
function setH(v){SIDES[cur].W[sc].pcs[sp].h=parseFloat(v)||0.3;renderWall();renderOpt(SIDES[cur].W[sc].pcs[sp]);refreshGrand();}
function addPc(d){var a=SIDES[cur].W[sc].pcs,idx=sp+(d<0?0:1);a.splice(idx,0,{fk:'fix',id:'fixed_glass',h:0.5,opt:{}});sp=idx;openFam=null;renderWall();renderEdit();refreshGrand();}
function mvPc(d){var a=SIDES[cur].W[sc].pcs,j=sp+d;if(j<0||j>=a.length)return;var t=a[sp];a[sp]=a[j];a[j]=t;sp=j;renderWall();renderEdit();}
function mvCol(d){var W=SIDES[cur].W,j=sc+d;if(j<0||j>=W.length)return;var t=W[sc];W[sc]=W[j];W[j]=t;sc=j;renderWall();renderEdit();}
function curP(){return SIDES[cur].W[sc].pcs[sp];}
function setOpt(k,v){curP().opt[k]=isNaN(parseFloat(v))?v:parseFloat(v);renderOpt(curP());refreshGrand();}
function togHandle(){var o=curP().opt;o.handle=!o.handle;renderOpt(curP());refreshGrand();}
function togMosq(){var o=curP().opt;o.mosq=!o.mosq;renderOpt(curP());refreshGrand();}
function togStruct(k){var o=curP().opt;o.structOn=o.structOn||{};if(o.structOn[k]!=null)delete o.structOn[k];else o.structOn[k]=(k==='soft_close'||k==='sling')?1:4;renderOpt(curP());refreshGrand();}
function setStruct(k,v){curP().opt.structOn[k]=parseFloat(v)||0;renderOpt(curP());refreshGrand();}
function togBEx(k){var o=curP().opt;o.exOn=o.exOn||{};if(o.exOn[k]!=null)delete o.exOn[k];else o.exOn[k]=EXDEF[k].def||0;renderOpt(curP());refreshGrand();}
function setBExSub(k,i){curP().opt.exOn[k]=i;renderOpt(curP());refreshGrand();}
function setBExVal(k,v){curP().opt.exOn[k]=parseFloat(v)||0;renderOpt(curP());refreshGrand();}
function refreshGrand(){document.getElementById('grand').textContent=fmt(roomTotal());}
function setRoofMat(b,i){ROOF.mat=[1500,2500,1800][i];render();}
function setRoofFrame(b,i){ROOF.frame=[0,300][i];render();}
function setRoofBatten(b,i){ROOF.batten=[0,200][i];render();}
function setEnd(v){ROOF.end=v;render();}
function setGtype(r){ROOF.gtype=r;render();}
function setRoofV(k,v){ROOF[k]=parseFloat(v)||0;render();}
function togRfEx(k){if(ROOF.ex[k]!=null)delete ROOF.ex[k];else ROOF.ex[k]={beam:6,pole:2,hs:6,pvc:3}[k];render();}
function setRfEx(k,v){ROOF.ex[k]=parseFloat(v)||0;render();}
function setCeilHas(v){CEIL.has=v?1:0;render();}
function setArea2(a){CEIL.area2=a;render();}
function setCkolor(b,i){CEIL.ckolor=[2100,2700][i];render();}
function setCframe(b,i){CEIL.cframe=[0,250][i];render();}
function setCeilV(k,v){CEIL[k]=isNaN(parseFloat(v))?v:parseFloat(v);render();}
function setCeilMode(m){CEIL.mode=m;render();}
function setElec(k,v){ELEC[k]=parseFloat(v)||0;render();}
function togElec(k){if(ELEC.extras[k])delete ELEC.extras[k];else ELEC.extras[k]=1;render();}
function pkv(b){var x=b.closest('.chips');[].forEach.call(x.querySelectorAll('.c'),function(c){if(!c.classList.contains('pill'))c.classList.remove('on');});b.classList.add('on');}
render();
</script>
</body>
</html>
