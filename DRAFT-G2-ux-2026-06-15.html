  h+='<div class="lbl"><span class="step">M</span>ทำเป็นอะไร</div>'+chips([['panel','🧱 ติดตาย (ผนัง/บังตา)'],['door','🚪 ทำเป็นบาน · Inception']],S.mode,'setMode',true);
  if(S.mode==='panel'){
    h+='<div class="lbl">โครง</div>'+chips(frames,curFrame,frameCb,true);
  }else{
    h+='<div class="lbl">ชนิดบาน <span class="hint">("Inception" ระแนงยัดในบาน · บานภายนอก · ระแนง=ไม่โครงอัตโนมัติ)</span></div>'+chips(DOORTYPES,S.doorType,'setDoorType',true);
    h+='<div class="row" style="margin-top:7px;"><div class="fld"><span>ค่าทำบาน (auto คิดให้ · กรอกเพื่อแก้)</span><input type="number" step="500" value="'+(S.doorCost||'')+'" placeholder="ว่าง = auto" oninput="setDoorCost(this.value)"></div></div>';
    h+='<div class="note" id="rndoorbd">เลือกชนิดบานเพื่อดูราคา</div>';
  }
  return h;
}
function ranaeBody(){return '<div class="lbl">ขนาดงาน</div>'+sizeHTML()+'<div class="lbl">วิธีตัดระแนง <span class="hint">(มีผลต่อราคา)</span></div>'+chips([['round','ปัดไม่ต่อ (เนียน)'],['splice','ต่อสูงจริง (ประหยัด)']],S.cut,'setCut',true)+'<div class="lbl">สี/ผิว</div>'+finChips(S.color)+extrasOnly();}
function impOf(){var sh=S.rail.shape==='เฉียง'?0:3;var mn={'หมุด':1,'ยู':2,'เสา':3}[S.rail.mount];return 'imp'+(sh+mn);}

function render(){var f=document.getElementById('form'),h='';
  if(S.cat==='gate'){
    h+='<div class="lbl"><span class="step">2</span>ชนิดประตูรั้ว</div><div class="chips"><button class="chip sm on">🚪 บานเลื่อน</button></div><div class="note" style="margin-top:4px;">ประตูรั้ว = <b>บานเลื่อนเท่านั้น</b> · ราคา = ค่าทำประตูรั้ว + ค่าระแนงไม่โครง</div>';
    h+='<div class="lbl"><span class="step">3</span>ลายระแนง <span class="hint">(ไม่โครง · ขนาดเส้น→ระยะ)</span></div>'+chips(BOX_ORDER.filter(function(b){return RTREE[b];}),S.gate.profile,'setGprof',true);
    if(S.gate.profile&&RTREE[S.gate.profile]){var gsp=[];Object.keys(RTREE[S.gate.profile]).forEach(function(fc){Object.keys(RTREE[S.gate.profile][fc]).forEach(function(gp){if(RTREE[S.gate.profile][fc][gp]['ไม่โครง']&&gsp.indexOf(fc+' '+gp)<0)gsp.push(fc+' '+gp);});});h+='<div class="lbl" style="margin-top:6px;">หน้าโชว์ · ระยะ</div>'+chips(gsp,S.gate.spacing,'setGspac',true);}
    h+='<div class="lbl"><span class="step">4</span>ขนาด</div>'+sizeHTML('กว้าง (ม.)','สูง (ม.)');
    h+='<div class="lbl">สีอบ/ผิว</div>'+chips(['อบขาว','ดำ','สีเทาซาฮาร่า','สีลายไม้สต๊อก','อบสีพิเศษ','สีลายไม้อบพิเศษ'],S.gate.color,'setGcolor',true);
    h+='<div class="lbl">ชนิดราง</div>'+chips([['ตรง','ตรง (1,500/ม.)'],['โค้ง','โค้ง (2,500/ม.)']],S.gate.rail,'setGrail',true);
    h+='<div class="lbl">มอเตอร์ <span class="hint">(ตัว)</span></div><div class="stepper"><button onclick="gMotor(-1)">−</button><input id="gm" value="'+S.gate.motor+'" readonly><button onclick="gMotor(1)">+</button></div> &nbsp; '+chips([['no','ไม่มีธรณี'],['yes','มีธรณี']],S.gate.thresh?'yes':'no','setGthresh',true);
    h+='<div class="selname">ประตูรั้วบานเลื่อน'+(S.gate.patId?(' · ลายระแนง '+S.gate.patId+' ไม่โครง (เรต '+S.gate.patRate.toLocaleString()+')'):' · เลือกลายระแนง')+'</div>';
    h+='<div class="note" id="gatebd">เลือกลายระแนงเพื่อดูราคา</div>';
  } else if(S.cat==='ranae'){
    h+='<div class="lbl"><span class="step">2</span>ชนิดระแนง</div><div class="subtab">'
      +'<button class="chip'+(S.rtype==='box'?' on':'')+'" onclick="pickRtype(\'box\')">📐 ระแนงกล่อง<br><span style="font-size:10px;font-weight:400;">บังตา/ผนัง</span></button>'
      +'<button class="chip'+(S.rtype==='gleed'?' on':'')+'" onclick="pickRtype(\'gleed\')">🧊 เกล็ด Z<br><span style="font-size:10px;font-weight:400;">เฉียง</span></button>'
      +'<button class="chip'+(S.rtype==='slide'?' on':'')+'" onclick="pickRtype(\'slide\')">🚪 เลื่อน Inception<br><span style="font-size:10px;font-weight:400;">ลูกฟูกเรียบ 2 ทาง</span></button>'
      +'</div>';
    if(S.rtype==='slide'){
      h+='<div class="lbl"><span class="step">3</span>ขนาด</div>'+sizeHTML();
      h+='<div class="lbl">เลือกบาน <span class="hint">("ไม่มี" = ระแนงเลื่อนติดตาย · เลือกบาน = ยัดในบาน G1)</span></div>'+chips(SLIDE_DOORS,S.slide.door,'setSlideDoor',true);
      h+='<div class="lbl">สีอบ</div>'+chips(SLIDE_FIN,String(S.slide.fin),'setSlideFin',true);
      h+='<div class="selname">ระแนงเลื่อน ลูกฟูกเรียบ 2 ทาง'+(S.slide.door?(' + '+DOORLBL[S.slide.door]):' (ติดตาย)')+'</div><div class="note" id="slidebd"></div>';
    } else if(S.rtype==='box'){
      h+='<div class="lbl"><span class="step">3</span>ขนาดเส้น/กล่อง</div>'+chips(BOX_ORDER.filter(function(b){return RTREE[b];}),S.r.box,'pickBox');
      if(S.r.box){var faces=Object.keys(RTREE[S.r.box]);h+='<div class="lbl"><span class="step">4</span>หน้าโชว์ <span class="hint">'+(faces.length>1?'(กล่องนี้โชว์ได้ '+faces.length+' หน้า)':'(โชว์หน้าเดียว)')+'</span></div>'+chips(faces,S.r.face,'pickFace',true);}
      if(S.r.box&&S.r.face){var gaps=Object.keys(RTREE[S.r.box][S.r.face]);h+='<div class="lbl"><span class="step">5</span>ระยะห่าง</div>'+chips(gaps,S.r.gap,'pickGap',true);}
      if(S.r.box&&S.r.face&&S.r.gap){
        h+=ranaeTail(Object.keys(RTREE[S.r.box][S.r.face][S.r.gap]),S.r.frame,'pickRframe');
        if(S.r.id){h+='<div class="selname">'+sel('กล่อง',S.r.box+' โชว์ '+S.r.face,S.r.id,S.r.rate)+'</div>'+ranaeBody();}
      }
    } else {
      h+='<div class="lbl"><span class="step">3</span>ขนาดเกล็ด</div>'+chips(Object.keys(GTREE).map(function(s){return [s,s.replace('”',' นิ้ว')];}),S.g.size,'pickGs',true);
      if(S.g.size){
        h+=ranaeTail(Object.keys(GTREE[S.g.size]),S.g.frame,'pickGf');
        if(S.g.id){h+='<div class="selname">'+sel('เกล็ด Z',S.g.size,S.g.id,S.g.rate)+'</div>'+ranaeBody();}
      }
    }
  } else if(S.cat==='rail'){
    h+='<div class="lbl"><span class="step">2</span>ทรงราว</div>'+chips(['เฉียง','ตรง'],S.rail.shape,'pickRsh',true);
    h+='<div class="lbl"><span class="step">3</span>ระบบยึด</div>'+chips([['หมุด','หมุดแปะข้าง'],['ยู','วางยู+ครอบอลู'],['เสา','เสาตั้ง+ราวบน']],S.rail.mount,'pickRmn',true);
    h+='<div class="lbl"><span class="step">4</span>ความยาว <span class="hint">(ม.)</span></div><div class="fld"><input type="number" step="0.1" value="'+S.w+'" oninput="setSz(\'w\',this.value)"></div>';
    h+='<div class="lbl">ความหนากระจก <span class="hint">(ไม่กระทบราคา)</span></div>'+chips([['10','10 มม.'],['12','12 มม.']],S.rail.glass,'pickRgl',true);
    h+='<div class="lbl">ราวมือจับด้านบน</div>'+chips([['none','ไม่มี'],['u','ยู +500/ม.'],['box','กล่อง +600/ม.']],S.rail.hr,'pickRhr',true);
    var imp=impOf();
    if(imp==='imp2'||imp==='imp3'||imp==='imp5'||imp==='imp6'){h+='<div class="lbl">สีอลู</div>'+chips(['ขาว','เทา','ดำ'],S.rail.alu,'pickRal',true);}
    h+='<div class="selname">'+RAILNAME[imp]+'</div><div class="note">ค่ากระจก (glassUp) + สีอลู → dev ดึง engine</div>';
  } else if(S.cat==='special'){
    h+='<div class="lbl"><span class="step">2</span>เลือกชนิด</div><div class="chips">'+SPECIAL.map(function(s){return '<button class="chip sm'+(S.special.id===s.id?' on':'')+'" style="flex-direction:column;align-items:flex-start;min-height:54px;padding:6px 12px;" onclick="pickSp(\''+s.id+'\')">'+s.name+'<span style="font-size:10px;font-weight:400;opacity:.75;">'+s.sub+'</span></button>';}).join('')+'</div>';
    h+='<div class="lbl"><span class="step">3</span>ขนาด</div>'+sizeHTML();
    h+='<div class="lbl">ทิศระแนง</div>'+chips([['v','แนวตั้ง'],['h','แนวนอน']],S.special.dir,'setSpDir',true);
    if(S.special.id==='bar_openclose'){
      h+='<div class="lbl">มอเตอร์</div><div class="toggle'+(S.special.motor?' on':'')+'" onclick="toggleSpMotor()"><span>'+(S.special.motor?'✓ ':'')+'เอามอเตอร์ (ไม่ติ๊ก = เปิด-ปิดด้วยมือ)</span></div>';
      h+='<div class="lbl">สีอบ</div>'+chips(BOC_FIN,String(S.special.fin),'setSpFin',true);
    } else {
      h+='<div class="note">มอเตอร์ 38.1 / สี = ดึง engine (ราคาฐาน+ชุดเพิ่ม คิดให้แล้ว)</div>';
    }
    h+='<div class="selname" id="spname"></div><div class="note" id="spbd"></div>';
  }
  f.innerHTML=h;calc();
}
function sel(kind,dim,id,rate){return S.mode==='door'?('บาน ('+(S.doorType?DOORLBL[S.doorType]:'เลือกชนิดบาน')+') + ระแนง'+kind+' '+dim+' ไม่โครง เรต '+rate.toLocaleString()):('ระแนง'+kind+' '+dim+' · '+id+' · เรต '+rate.toLocaleString()+'/ตร.ม.');}

function slidePrice(){var W=S.w,H=S.h,A=W*H;
  var doorC=S.slide.door?doorBaseCalc(S.slide.door,A):0;
  var slideC=Math.max(3000,A*1000);
  var Hr=H<=1?1:H<=1.5?1.5:H<=2?2:3;
  var corr=Math.max(3500,W*Hr*3500);
  var finC=(+S.slide.fin||0)*A;
  var val=rU(doorC+slideC+corr+finC);
  var bd=(S.slide.door?('ค่าประตู '+DOORLBL[S.slide.door]+' '+fmt(doorC)+' + '):'')+'ค่าเลื่อน '+fmt(slideC)+' + ลูกฟูกเรียบ2ทาง '+fmt(corr)+(finC?(' + สี '+fmt(finC)):'');
  return {val:val,bd:bd};
}
function specialPrice(){var W=S.w,H=S.h,A=W*H;
  if(S.special.id==='bar_openclose'){
    var dir=S.special.dir,Dpar=dir==='v'?H:W,ns=Math.min(3,Math.max(1,Math.ceil(Dpar/3)));
    var D=dir==='v'?W:H,Aper=A/ns;
    var ranaeC=ns*Math.max(20700,Aper*6900),ocC=ns*D*2000;
    var motorC=S.special.motor?(ns*Math.ceil(D/3)*10000):0,finC=(+S.special.fin||0)*A;
    return {val:rU(ranaeC+ocC+motorC+finC),bd:'ค่าระแนง '+fmt(ranaeC)+' + เปิด-ปิด '+fmt(ocC)+(motorC?(' + มอเตอร์ '+fmt(motorC)):'')+(finC?(' + สี '+fmt(finC)):'')+' · '+ns+' ชุด'};
  }
  if(S.special.id==='bar_grid_z'){
    var dir2=S.special.dir,D2=dir2==='v'?H:W,ns2=Math.max(1,Math.ceil(D2/1.5));
    var areaPer=A/ns2,base=Math.max(5500,A*5500),extraPer=Math.max(500,areaPer*1500)+1000;
    return {val:rU(base+(ns2-1)*extraPer),bd:'ฐาน '+fmt(base)+(ns2>1?(' + '+(ns2-1)+'×'+fmt(extraPer)):'')+' · '+ns2+' ชุด'+(dir2==='v'?' (ตั้ง)':' (นอน)')};
  }
  return {val:0,bd:''};
}

function calc(){var val=0,title='—',rate=0,id='',kind='';
  if(S.cat==='gate'){
    var A=S.w*S.h,mk=A<=6?4000:A<=8?3500:A<=10?3000:2500,makeC=A*mk,disc=ranaeDisc(A);
    var rnC=S.gate.patRate>0?A*S.gate.patRate*(1-disc):0;
    var mtC=(S.gate.motor||0)*30000,railr=S.gate.rail==='โค้ง'?2500:1500,railC=2*S.w*railr;
    var leafC=S.gate.rail==='โค้ง'?Math.ceil(S.w/0.75)*4000:0;
    val=rU(makeC+rnC+mtC+railC+leafC);title='ประตูรั้วบานเลื่อน';
    var spcl=(S.gate.color&&S.gate.color!=='อบขาว'&&S.gate.color!=='ดำ');
    var bd=document.getElementById('gatebd');if(bd)bd.innerHTML='ค่าทำประตู '+fmt(makeC)+' + ระแนงไม่โครง '+fmt(rnC)+' + มอเตอร์ '+fmt(mtC)+' + ราง '+fmt(railC)+(leafC?(' + บานโค้ง '+fmt(leafC)):'')+' = <b>'+fmt(val)+'</b>'+(spcl?' · (+ค่าสีอบ dev คิดตามรุ่น)':'');
  } else if(S.cat==='ranae'&&S.rtype==='slide'){
    var spl=slidePrice();val=spl.val;title='ระแนงเลื่อน Inception'+(S.slide.door?(' + '+DOORLBL[S.slide.door]):' ติดตาย');
    var sbd=document.getElementById('slidebd');if(sbd)sbd.innerHTML=spl.bd+' = <b>'+fmt(spl.val)+'</b>';
  } else if(S.cat==='ranae'){
    if(S.rtype==='box'){rate=S.r.rate;id=S.r.id;kind=S.r.box+' โชว์ '+S.r.face;}
    else {rate=S.g.rate;id=S.g.id;kind=S.g.size;}
    if(id){var hh=S.cut==='splice'?S.h:ranaeH(S.h),a=S.w*hh,disc2=ranaeDisc(a),fv=finVal(S.color);
      if(S.mode==='door'){
        var db=(+S.doorCost>0)?(+S.doorCost):doorBaseCalc(S.doorType,a);
        var rnPart=(a*rate+a*fv*0.85)*(1-disc2);
        val=rU(rnPart+db);title='บาน+ระแนง '+id;
        var bd2=document.getElementById('rndoorbd');if(bd2)bd2.innerHTML=(S.doorType?('ค่าทำบาน '+DOORLBL[S.doorType]+' '+fmt(db)+((+S.doorCost>0)?' (แก้เอง)':' (auto)')):'⚠ เลือกชนิดบานก่อน')+' + ค่าระแนงไม่โครง '+fmt(rnPart)+' = <b>'+fmt(val)+'</b> (ปัดพันรวม)';
      } else {val=rU(a*(rate+fv)*(1-disc2));title='ระแนง '+kind;}
    }
  } else if(S.cat==='rail'){val=railPrice(impOf(),S.w,S.rail.hr);title=RAILNAME[impOf()];}
  else if(S.cat==='special'){var sp=specialPrice();val=sp.val;var spo=SPECIAL.filter(function(x){return x.id===S.special.id;})[0];title=spo?spo.name:'';var sn=document.getElementById('spname');if(sn)sn.textContent=(spo?spo.name:'')+' '+S.w+'×'+S.h+' ม.';var sb=document.getElementById('spbd');if(sb)sb.innerHTML=sp.bd+' = <b>'+fmt(sp.val)+'</b>';}
  var tot=val*(S.sets||1);
  document.getElementById('pval').textContent=fmt(tot);
  document.getElementById('ptitle').textContent=title+(S.sets>1?(' × '+S.sets+' ชุด'):'');
}
function resolveR(){var n=RTREE[S.r.box];if(!n||!n[S.r.face]||!n[S.r.face][S.r.gap]){S.r.id='';S.r.rate=0;return;}var fr=S.mode==='door'?'ไม่โครง':S.r.frame;var o=n[S.r.face][S.r.gap][fr]||n[S.r.face][S.r.gap]['รวมโครง']||n[S.r.face][S.r.gap]['ไม่โครง'];if(o){S.r.id=o.id;S.r.rate=o.rate;}else{S.r.id='';S.r.rate=0;}}
function resolveG(){var fr=S.mode==='door'?'ไม่โครง':S.g.frame;var o=GTREE[S.g.size]&&GTREE[S.g.size][fr];if(o){S.g.id=o.id;S.g.rate=o.rate;}else{S.g.id='';S.g.rate=0;}}
function resolveCur(){if(S.rtype==='box')resolveR();else resolveG();}

function resetMode(){S.mode='panel';S.doorType='';S.doorCost=0;}
function pickCat(b){[].forEach.call(document.querySelectorAll('#catChips .chip'),function(c){c.classList.remove('on');});b.classList.add('on');S.cat=b.dataset.c;resetMode();render();}
function pickRtype(v){S.rtype=v;resetMode();resolveCur();render();}
function setSz(k,v){S[k]=parseFloat(v)||0;calc();}
function setSets(v){S.sets=Math.max(1,parseInt(v)||1);calc();}
function setCut(v){S.cut=v;render();}
function setColor(v){S.color=v;render();}
function setMode(v){S.mode=v;resolveCur();render();}
function setDoorType(v){S.doorType=v;render();}
function setDoorCost(v){S.doorCost=parseFloat(v)||0;calc();}
function pickBox(v){S.r.box=v;S.r.face='';S.r.gap='';S.r.frame='รวมโครง';resolveR();render();}
function pickFace(v){S.r.face=v;S.r.gap='';S.r.frame='รวมโครง';resolveR();render();}
function pickGap(v){S.r.gap=v;S.r.frame='รวมโครง';resolveR();render();}
function pickRframe(v){S.r.frame=v;resolveR();render();}
function pickGs(v){S.g.size=v;S.g.frame='รวมโครง';resolveG();render();}
function pickGf(v){S.g.frame=v;resolveG();render();}
function pickRsh(v){S.rail.shape=v;render();}
function pickRmn(v){S.rail.mount=v;render();}
function pickRgl(v){S.rail.glass=v;render();}
function pickRhr(v){S.rail.hr=v;render();}
function pickRal(v){S.rail.alu=v;render();}
function setGprof(v){S.gate.profile=v;S.gate.spacing='';resolveGate();render();}
function setGspac(v){S.gate.spacing=v;resolveGate();render();}
function resolveGate(){var box=RTREE[S.gate.profile];if(!box){S.gate.patId='';S.gate.patRate=0;return;}var parts=S.gate.spacing.split(' ');var fc=parts[0],gp=parts.slice(1).join(' ');var o=box[fc]&&box[fc][gp]&&box[fc][gp]['ไม่โครง'];if(o){S.gate.patId=o.id;S.gate.patRate=o.rate;}else{S.gate.patId='';S.gate.patRate=0;}}
function setGcolor(v){S.gate.color=v;render();}
function setGrail(v){S.gate.rail=v;render();}
function setGthresh(v){S.gate.thresh=(v==='yes');render();}
function gMotor(d){S.gate.motor=Math.max(0,S.gate.motor+d);var e=document.getElementById('gm');if(e)e.value=S.gate.motor;calc();}
function setSlideDoor(v){S.slide.door=v;render();}
function setSlideFin(v){S.slide.fin=parseFloat(v)||0;render();}
function pickSp(v){S.special.id=v;render();}
function setSpDir(v){S.special.dir=v;render();}
function toggleSpMotor(){S.special.motor=!S.special.motor;render();}
function setSpFin(v){S.special.fin=parseFloat(v)||0;render();}
render();
</script>
</body>
</html>
