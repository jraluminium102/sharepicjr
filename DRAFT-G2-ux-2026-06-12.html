  } else if(S.cat==='bangta'){
    h+='<div class="lbl"><span class="step">2</span>ขนาดเส้นระแนง</div>'+chips(Object.keys(TREE_B),S.b.profile,'pickBp');
    if(S.b.profile){h+='<div class="lbl"><span class="step">3</span>ระยะโชว์</div>'+chips(Object.keys(TREE_B[S.b.profile]),S.b.spacing,'pickBs',true);}
    if(S.b.profile&&S.b.spacing){
      h+='<div class="lbl"><span class="step">4</span>ทำเป็นอะไร</div>'+chips([['panel','🧱 ผนัง/บังตา (ระแนงเปล่า)'],['door','🚪 ทำเป็นบาน (ประตู/หน้าต่าง)']],S.b.mode,'pickBmode',true);
      if(S.b.mode==='panel'){
        h+='<div class="lbl"><span class="step">5</span>โครง</div>'+chips(Object.keys(TREE_B[S.b.profile][S.b.spacing]),S.b.frame,'pickBf',true);
      } else {
        h+='<div class="lbl"><span class="step">5</span>ชนิดบาน <span class="hint">(ระแนงใช้ "ไม่โครง" อัตโนมัติ — บานให้โครงเอง)</span></div>'+chips([['sliding_sms','บานเลื่อนเซมิ'],['sliding_euro','บานเลื่อนยูโร'],['casement_euro','บานเปิด'],['folding','บานเฟี้ยม'],['curved_single','ดัดโค้งเดี่ยว']],S.b.doorType,'pickBdoor',true);
        h+='<div class="row" style="margin-top:7px;"><div class="fld"><span>ค่าทำบาน (บาท · dev ดึงเรต door จริง · กรอก override ได้)</span><input type="number" step="500" value="'+S.b.doorCost+'" placeholder="ค่าทำบาน" oninput="setBdoorCost(this.value)"></div></div>';
        h+='<div class="note">ราคารวม = <b>ค่าทำบาน</b> ('+(S.b.doorType?({sliding_sms:'บานเลื่อนเซมิ',sliding_euro:'บานเลื่อนยูโร',casement_euro:'บานเปิด',folding:'บานเฟี้ยม',curved_single:'ดัดโค้งเดี่ยว'}[S.b.doorType]):'เลือกชนิดบาน')+') <b>+ ค่าระแนงไม่โครง</b> (เรต '+(S.b.rate?S.b.rate.toLocaleString():'-')+' × พื้นที่)</div>';
      }
    }
    if(S.b.id){h+='<div class="selname">'+(S.b.mode==='door'?('บาน + ระแนง '+S.b.id+' (ไม่โครง · เรต '+S.b.rate.toLocaleString()+')'):('เลือก: '+S.b.id+' (เรต '+S.b.rate.toLocaleString()+'/ตร.ม.)'))+'</div>'+ranaeForm(false);}
  } else if(S.cat==='phanang'){
    h+='<div class="lbl"><span class="step">2</span>ระยะโชว์</div>'+chips(Object.keys(TREE_P),S.p.spacing,'pickPs',true);
    if(S.p.spacing){h+='<div class="lbl"><span class="step">3</span>โครง</div>'+chips(Object.keys(TREE_P[S.p.spacing]),S.p.frame,'pickPf',true);}
    if(S.p.id){h+='<div class="selname">เลือก: '+S.p.id+' (เรต '+S.p.rate.toLocaleString()+'/ตร.ม.)</div>'+ranaeForm(true);}
  } else if(S.cat==='gleed'){
    h+='<div class="lbl"><span class="step">2</span>ขนาดเกล็ด</div>'+chips([['1”','1 นิ้ว'],['1.6”','1.6 นิ้ว'],['4”','4 นิ้ว']],S.g.size,'pickGs',true);
    if(S.g.size){h+='<div class="lbl"><span class="step">3</span>โครง</div>'+chips(['ไม่โครง','รวมโครง'],S.g.frame,'pickGf',true);}
    if(S.g.id){h+='<div class="selname">เลือก: '+S.g.id+' (เรต '+S.g.rate.toLocaleString()+'/ตร.ม.)</div>'+ranaeForm(true);}
  } else if(S.cat==='rail'){
    h+='<div class="lbl"><span class="step">2</span>ทรงราว</div>'+chips(['เฉียง','ตรง'],S.rail.shape,'pickRsh',true);
    h+='<div class="lbl"><span class="step">3</span>ระบบยึด</div>'+chips([['หมุด','หมุดแปะข้าง'],['ยู','วางยู+ครอบอลู'],['เสา','เสาตั้ง+ราวบน']],S.rail.mount,'pickRmn',true);
    h+='<div class="lbl"><span class="step">4</span>ความยาว <span class="hint">(ม.)</span></div><div class="fld"><input type="number" step="0.1" value="'+S.w+'" oninput="setSz(\'w\',this.value)"></div>';
    h+='<div class="lbl">ความหนากระจก <span class="hint">(ไม่กระทบราคา)</span></div>'+chips([['10','10 มม.'],['12','12 มม.']],S.rail.glass,'pickRgl',true);
    h+='<div class="lbl">ราวมือจับด้านบน</div>'+chips([['none','ไม่มี'],['u','ยู +500/ม.'],['box','กล่อง +600/ม.']],S.rail.hr,'pickRhr',true);
    var imp=impOf();
    if(imp==='imp2'||imp==='imp3'||imp==='imp5'||imp==='imp6'){h+='<div class="lbl">สีอลู</div>'+chips(['ขาว','เทา','ดำ'],S.rail.alu,'pickRal',true);}
    h+='<div class="selname">'+RAILNAME[imp]+'</div><div class="note">ค่ากระจก (glassUp) + สีอลู → dev ดึง engine</div>';
  } else if(S.cat==='special'){
    h+='<div class="lbl"><span class="step">2</span>เลือกชนิด</div>'+chips([['bar_slide','ระแนงเลื่อน'],['bar_grid_z','บานเกล็ดอลู 2 หน้า'],['bar_openclose','ระแนงเปิด-ปิด']],S.special.id,'pickSp',true);
    if(S.special.id){h+='<div class="row" style="margin-top:9px;"><div class="fld"><span>ราคา (กรอกเอง · บาท)</span><input type="number" step="500" value="'+S.special.price+'" oninput="setSpP(this.value)"></div></div><div class="note">ระแนงพิเศษ (เลื่อน/เปิด-ปิด) สูตรซับซ้อน → dev ดึง engine · กรอกประมาณการ</div>';}
  }
  f.innerHTML=h;calc();
}
function calc(){var val=0,title='—',isGate=false;
  if(S.cat==='gate'){title='ประตูรั้ว';isGate=true;}
  else if(S.cat==='bangta'&&S.b.id){var rc=ranaePrice(S.b.rate,S.w,S.h,S.cut,finVal(S.color));val=S.b.mode==='door'?(rc+(+S.b.doorCost||0)):rc;title=(S.b.mode==='door'?'บาน+ระแนง ':'ระแนงบังตา ')+S.b.id;}
  else if(S.cat==='phanang'&&S.p.id){val=ranaePrice(S.p.rate,S.w,S.h,S.cut,finVal(S.color))+(+S.door.price||0);title='ระแนงผนัง '+S.p.id;}
  else if(S.cat==='gleed'&&S.g.id){val=ranaePrice(S.g.rate,S.w,S.h,S.cut,finVal(S.color))+(+S.door.price||0);title='เกล็ด Z '+S.g.id;}
  else if(S.cat==='rail'){val=railPrice(impOf(),S.w,S.rail.hr);title=RAILNAME[impOf()];}
  else if(S.cat==='special'&&S.special.id){val=+S.special.price||0;title=S.special.id;}
  var tot=val*(S.sets||1);
  document.getElementById('pval').textContent=isGate?'ดึง engine':fmt(tot);
  document.getElementById('ptitle').textContent=title+(S.sets>1?(' × '+S.sets+' ชุด'):'');
}
function resolveB(){var n=TREE_B[S.b.profile];if(!n||!n[S.b.spacing]){S.b.id='';S.b.rate=0;return;}var fr=S.b.mode==='door'?'ไม่โครง':S.b.frame;var o=n[S.b.spacing][fr];if(o){S.b.id=o.id;S.b.rate=o.rate;}else{S.b.id='';S.b.rate=0;}}
function resolveP(){var n=TREE_P[S.p.spacing];if(n&&n[S.p.frame]){S.p.id=n[S.p.frame].id;S.p.rate=n[S.p.frame].rate;}else{S.p.id='';S.p.rate=0;}}
function resolveG(){var r=DATA.gleed.find(function(x){return x[2]===S.g.size&&x[3]===S.g.frame;});if(r){S.g.id=r[0];S.g.rate=r[1];}else{S.g.id='';S.g.rate=0;}}

function pickCat(b){[].forEach.call(document.querySelectorAll('#catChips .chip'),function(c){c.classList.remove('on');});b.classList.add('on');S.cat=b.dataset.c;render();}
function setSz(k,v){S[k]=parseFloat(v)||0;calc();}
function setSets(v){S.sets=Math.max(1,parseInt(v)||1);calc();}
function setCut(v){S.cut=v;render();}
function setColor(v){S.color=v;render();}
function pickBp(v){S.b.profile=v;S.b.spacing='';S.b.frame='';resolveB();render();}
function pickBs(v){S.b.spacing=v;S.b.frame='';resolveB();render();}
function pickBf(v){S.b.frame=v;resolveB();render();}
function pickBmode(v){S.b.mode=v;resolveB();render();}
function pickBdoor(v){S.b.doorType=v;render();}
function setBdoorCost(v){S.b.doorCost=parseFloat(v)||0;calc();}
function pickPs(v){S.p.spacing=v;S.p.frame='';resolveP();render();}
function pickPf(v){S.p.frame=v;resolveP();render();}
function pickGs(v){S.g.size=v;S.g.frame='';resolveG();render();}
function pickGf(v){S.g.frame=v;resolveG();render();}
function pickRsh(v){S.rail.shape=v;render();}
function pickRmn(v){S.rail.mount=v;render();}
function pickRgl(v){S.rail.glass=v;render();}
function pickRhr(v){S.rail.hr=v;render();}
function pickRal(v){S.rail.alu=v;render();}
function setGopen(v){S.gate.open=v;render();}
function resolveGate(){var n=TREE_B[S.gate.profile];if(n&&n[S.gate.spacing]&&n[S.gate.spacing]['ไม่โครง']){var o=n[S.gate.spacing]['ไม่โครง'];S.gate.patId=o.id;S.gate.patRate=o.rate;}else{S.gate.patId='';S.gate.patRate=0;}}
function setGprof(v){S.gate.profile=v;S.gate.spacing='';resolveGate();render();}
function setGspac(v){S.gate.spacing=v;resolveGate();render();}
function setGcolor(v){S.gate.color=v;render();}
function setGrail(v){S.gate.rail=v;render();}
function setGthresh(v){S.gate.thresh=(v==='yes');render();}
function gMotor(d){S.gate.motor=Math.max(0,S.gate.motor+d);var e=document.getElementById('gm');if(e)e.value=S.gate.motor;}
function setDoor(v){S.door.type=v;render();}
function setDoorP(v){S.door.price=parseFloat(v)||0;calc();}
function pickSp(v){S.special.id=v;render();}
function setSpP(v){S.special.price=parseFloat(v)||0;calc();}
render();
</script>
</body>
</html>
