<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JR — รวมไฟล์เอกสาร</title>
<style>
  :root {
    --bg:#0f172a; --bg2:#1e293b; --card:#1e293b; --card-hover:#334155;
    --accent:#38bdf8; --accent2:#818cf8; --text:#e2e8f0; --muted:#94a3b8; --border:#334155;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,"Segoe UI","Sarabun","Noto Sans Thai",Tahoma,sans-serif;
    background:linear-gradient(160deg,var(--bg) 0%,#111827 100%);
    color:var(--text); min-height:100vh; padding:32px 16px 64px;
  }
  .wrap { max-width:880px; margin:0 auto; }
  header { text-align:center; margin-bottom:40px; }
  .logo {
    display:inline-flex; align-items:center; justify-content:center;
    width:64px; height:64px; border-radius:18px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    font-size:30px; font-weight:800; color:#0f172a; margin-bottom:16px;
    box-shadow:0 8px 24px rgba(56,189,248,.25);
  }
  h1 { font-size:28px; font-weight:700; letter-spacing:-.5px; }
  .sub { color:var(--muted); margin-top:8px; font-size:15px; }
  .count { color:var(--muted); font-size:14px; margin:0 4px 16px; }
  .grid { display:grid; gap:14px; }
  a.file {
    display:flex; align-items:center; gap:16px;
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:18px 20px; text-decoration:none; color:var(--text);
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
  }
  a.file:hover { background:var(--card-hover); border-color:var(--accent); transform:translateY(-2px); }
  .icon {
    flex:0 0 auto; width:44px; height:44px; border-radius:10px;
    background:rgba(56,189,248,.12); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  .meta { flex:1 1 auto; min-width:0; }
  .name { font-size:16px; font-weight:600; word-break:break-word; }
  .file-sub { font-size:13px; color:var(--muted); margin-top:3px; }
  .arrow { color:var(--muted); font-size:20px; flex:0 0 auto; }
  .state { text-align:center; color:var(--muted); padding:40px 20px; border:1px dashed var(--border); border-radius:14px; }
  footer { text-align:center; margin-top:40px; color:var(--muted); font-size:13px; }
  footer a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">JR</div>
      <h1>รวมไฟล์เอกสาร</h1>
      <p class="sub">คลิกเพื่อเปิดไฟล์ได้เลย</p>
    </header>

    <p class="count">พบ 1 ไฟล์</p>
    <div class="grid">
      <a class="file" href="./JR_MindMap_%E0%B8%A3%E0%B8%B0%E0%B8%9A%E0%B8%9A%E0%B8%AD%E0%B8%AD%E0%B8%9F%E0%B8%9F%E0%B8%B4%E0%B8%A8.html">
        <span class="icon">&#128196;</span>
        <span class="meta">
          <span class="name">JR MindMap ระบบออฟฟิศ</span>
          <span class="file-sub">JR_MindMap_ระบบออฟฟิศ.html</span>
        </span>
        <span class="arrow">&rsaquo;</span>
      </a>
    </div>

    <footer>
      อัปเดตล่าสุด 2026-06-03 15:19 ·
      <a href="https://github.com/jraluminium102/sharepicjr" target="_blank" rel="noopener">ดูใน GitHub</a>
    </footer>
  </div>
</body>
</html>
