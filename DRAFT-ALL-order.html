<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"Segoe UI","Sarabun",Tahoma,sans-serif;margin:0;background:#f5f6f8;color:#1f2937;line-height:1.5}
.wrap{max-width:680px;margin:0 auto;padding:16px 14px 80px}
.hd{background:#b3122a;color:#fff;border-radius:14px;padding:14px 18px;margin-bottom:10px}
.hd h1{margin:0 0 3px;font-size:18px;font-weight:700}.hd p{margin:0;font-size:12.5px;opacity:.92}
.grp{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.gb{min-height:40px;padding:0 13px;border:1.5px solid #d1d5db;border-radius:10px;background:#fff;font-size:13px;font-weight:700;color:#374151;cursor:pointer}
.gb.on{border-color:#b3122a;background:#b3122a;color:#fff}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.tab{flex:1;min-width:110px;min-height:42px;border:1.5px solid #d1d5db;border-radius:11px;background:#fff;font-size:13.5px;font-weight:700;color:#374151;cursor:pointer}
.tab.on{border-color:#b3122a;background:#b3122a;color:#fff}
.hint{font-size:12px;color:#475569;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:8px 11px;margin-bottom:10px}
.hint b{color:#b3122a}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:11px}
.legend span{display:flex;align-items:center;gap:4px}.ldot{width:11px;height:11px;border-radius:3px}
.list{list-style:none;margin:0;padding:0}
.card{background:#fff;border:1px solid #e5e7eb;border-left-width:5px;border-radius:11px;margin-bottom:8px;padding:9px 11px 11px;display:flex;gap:9px;align-items:flex-start;transition:box-shadow .12s}
.card.drag{opacity:.4}.card.over{box-shadow:0 0 0 2px #b3122a}
.grip{cursor:grab;color:#9ca3af;font-size:19px;line-height:1;padding-top:2px;user-select:none;flex:0 0 auto}
.cmain{flex:1;min-width:0}
.crow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:6px}
.num{width:19px;height:19px;border-radius:50%;background:#eef;color:#555;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.cl{font-size:13.5px;font-weight:700;color:#374151}
.ztag{font-size:10px;font-weight:700;border-radius:5px;padding:1px 7px;color:#fff}
.nudge{margin-left:auto;display:flex;gap:3px}
.nudge button{width:26px;height:26px;border:1px solid #e5e7eb;border-radius:7px;background:#fafafa;cursor:pointer;font-size:13px;color:#6b7280;padding:0}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{min-height:30px;padding:0 10px;border:1.5px solid #d1d5db;border-radius:8px;background:#fff;font-size:11.5px;font-weight:600;color:#374151;display:inline-flex;align-items:center;gap:5px}
.chip.on{border-color:#b3122a;background:#fdecef;color:#b3122a}
.chip.sp{background:#b3122a;color:#fff;border-color:#b3122a}
.dot{width:11px;height:11px;border-radius:50%;border:1px solid #00000022}
.inp{height:30px;border:1px solid #d1d5db;border-radius:7px;padding:0 9px;font-size:11.5px;background:#fafafa;color:#6b7280;display:inline-flex;align-items:center;min-width:74px}
.sizerow{display:flex;gap:6px}.sizerow .inp{flex:1;justify-content:center}
.casc{font-size:11.5px;color:#475569;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:7px;padding:5px 8px}.casc b{color:#b3122a}
.doorbox{border:1.5px dashed #0f766e55;background:#f0fdfa;border-radius:8px;padding:7px 9px}
.flag{font-size:10px;font-weight:700;background:#fef3c7;color:#92722a;border-radius:5px;padding:1px 5px}
.dd{height:32px;border:1.5px solid #b3122a;border-radius:8px;padding:0 9px;font-size:12px;font-weight:600;color:#b3122a;background:#fff}
.bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #e5e7eb;padding:9px 14px;display:flex;gap:9px;align-items:center;justify-content:space-between;max-width:680px;margin:0 auto}
.bar button{min-height:40px;padding:0 16px;border-radius:10px;border:1.5px solid #d1d5db;background:#fff;font-size:13px;font-weight:700;color:#374151;cursor:pointer}
.bar .save{background:#b3122a;color:#fff;border-color:#b3122a}
.bar .ord{font-size:11px;color:#6b7280;flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

 var arr=ALL[curG].tabs[curT].features,h='';
 arr.forEach(function(f,i){
  h+='<li class="card" draggable="true" data-i="'+i+'" style="border-left-color:'+(ZONE[f.z]||'#ccc')+'">'
   +'<div class="grip">⠿</div><div class="cmain">'
   +'<div class="crow"><span class="num">'+(i+1)+'</span><span class="cl">'+f.l+'</span>'
   +(f.q?' <span class="flag" title="'+(f.qt||'').replace(/"/g,'')+'">⚠ เช็ค</span>':'')
   +'<span class="ztag" style="background:'+(ZONE[f.z]||'#ccc')+'">'+f.z+'</span>'
   +'<span class="nudge"><button onclick="mv('+i+',-1)">▲</button><button onclick="mv('+i+',1)">▼</button><button onclick="del('+i+')" style="color:#b3122a;border-color:#fca5a5">✕</button></span></div>'
   +control(f)
   +(f.q&&f.qt?'<div style="font-size:11px;color:#92722a;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:5px 7px;margin-top:5px">⚠ '+f.qt+'</div>':'')
   +'</div></li>';
 });
 listEl.innerHTML=h;
 document.getElementById('ord').textContent=GNAME[curG]+' · '+ALL[curG].tabs[curT].name+': '+arr.map(function(f,i){return (i+1)+'.'+f.l.replace(/ \(.*/,'');}).join('  ');
 bindDrag();
}
function mv(i,d){var a=ALL[curG].tabs[curT].features,j=i+d;if(j<0||j>=a.length)return;var t=a[i];a[i]=a[j];a[j]=t;render();}
function del(i){var a=ALL[curG].tabs[curT].features;if(confirm('ลบ "'+a[i].l+'"?')){a.splice(i,1);render();}}
function resetOrder(){if(confirm('คืนค่าเดิมแท็บนี้?')){ALL[curG].tabs[curT]=JSON.parse(JSON.stringify(ORIG[curG].tabs[curT]));render();}}
function copyOrder(){var a=ALL[curG].tabs[curT];var txt='ลำดับ '+GNAME[curG]+' › '+a.name+':\n'+a.features.map(function(f,i){return (i+1)+'. '+f.l;}).join('\n');if(navigator.clipboard){navigator.clipboard.writeText(txt).then(function(){alert('คัดลอกแล้ว ✅\n\n'+txt);},function(){prompt('ก็อป:',txt);});}else prompt('ก็อป:',txt);}
var dragI=null;
function bindDrag(){[].forEach.call(listEl.children,function(li){li.addEventListener('dragstart',function(){dragI=+li.dataset.i;li.classList.add('drag');});li.addEventListener('dragend',function(){li.classList.remove('drag');[].forEach.call(listEl.children,function(x){x.classList.remove('over');});});li.addEventListener('dragover',function(e){e.preventDefault();li.classList.add('over');});li.addEventListener('dragleave',function(){li.classList.remove('over');});li.addEventListener('drop',function(e){e.preventDefault();var to=+li.dataset.i;if(dragI==null||dragI===to)return;var a=ALL[curG].tabs[curT].features;var m=a.splice(dragI,1)[0];a.splice(to,0,m);dragI=null;render();});});}
render();
</script></body></html>
